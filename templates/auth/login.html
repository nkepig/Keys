<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · API Key 控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen font-sans text-gray-700 flex items-center justify-center p-6" style="background:linear-gradient(150deg,#f4f5f7 0%,#eef0f2 50%,#f0f2f4 100%); background-attachment:fixed;">
  <div class="w-full max-w-sm bg-white/72 backdrop-blur-md rounded-2xl shadow-lg shadow-slate-200/60 border border-white/80 p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center shadow-lg shadow-slate-700/30">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-slate-800 leading-none">API Key 控制台</h1>
        <p class="text-xs text-slate-500 mt-1">请输入访问密码</p>
      </div>
    </div>
    {% if error %}
    <p class="text-sm text-red-600 mb-4 bg-red-50 border border-red-100 rounded-lg px-3 py-2">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}
      <input type="password" name="password" required autocomplete="current-password" placeholder="密码"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none text-sm" />
      <button type="submit"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-semibold shadow-md shadow-blue-500/25 hover:from-blue-700 hover:to-indigo-700 transition">
        进入
      </button>
    </form>
  </div>
</body>
</html>
