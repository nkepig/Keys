{% set page_title = "登录" %}
{% extends "layout/auth.html" %}

{% block content %}
<div class="keys-narrow w-full">
  <div class="rounded-panel border border-line bg-surface px-8 py-10 sm:px-10 sm:py-12">
    <div class="mb-10">
      <div class="mb-6 flex h-11 w-11 items-center justify-center rounded-control ui-brand-mark text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
      </div>
      <h1 class="text-[32px] font-semibold leading-[1.15] tracking-tight text-ink">API Key 控制台</h1>
      <p class="mt-3 text-[15px] text-ink-muted">请输入访问密码以继续</p>
    </div>

    {% if error %}
    <p data-testid="login-error" role="alert"
       class="mb-6 rounded-control border border-danger/20 bg-danger/5 px-4 py-3 text-sm text-danger">
      {{ error }}
    </p>
    {% endif %}

    <form method="post" action="/login" class="space-y-6"
          x-data="{ submitting: false }"
          @submit="submitting = true">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}

      <div>
        <label for="login-password" class="mb-2 block text-[13px] font-medium text-ink">密码</label>
        <input id="login-password" data-testid="login-password"
               type="password" name="password" required autocomplete="current-password"
               placeholder="输入访问密码"
               class="h-control w-full rounded-control border border-line bg-surface px-4 text-sm text-ink outline-none transition-colors duration-fast ease-fluid placeholder:text-ink-subtle focus:border-ink" />
      </div>

      <button type="submit" data-testid="login-submit"
              :disabled="submitting"
              class="ui-press inline-flex h-control w-full items-center justify-center gap-2 rounded-control bg-accent text-sm font-semibold text-white shadow-soft hover:bg-accent-hover disabled:cursor-wait disabled:opacity-60">
        <span x-show="submitting" class="spin h-4 w-4 rounded-full border-2 border-white/40 border-t-white" aria-hidden="true"></span>
        <span x-text="submitting ? '进入中…' : '进入'"></span>
      </button>
    </form>
  </div>
</div>
{% endblock %}
